name: Format Check

on:
  pull_request:

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        # apt ships an older clang-format that cannot parse newer .clang-format
        # options (e.g. AlignEscapedNewlines: LeftWithLastLine, added in v21).
        run: pip install "clang-format>=21"

      - name: Check formatting
        run: |
          find src include examples -type f \( -name '*.c' -o -name '*.h' \) -print0 \
            | xargs -0 -r clang-format --dry-run --Werror
